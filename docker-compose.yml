version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aqua_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: aqua_platform
      MYSQL_USER: aqua_user
      MYSQL_PASSWORD: aqua123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aqua_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "aqua_user", "-paqua123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aqua_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - aqua_network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aqua_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aqua_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_initial_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=aqua_platform
      - DB_USER=aqua_user
      - DB_PASSWORD=aqua123456
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - REDIS_HOST=redis
      - DEBUG=True
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aqua_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua_celery_worker
    command: celery -A aqua_platform worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./media:/app/media
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=aqua_platform
      - DB_USER=aqua_user
      - DB_PASSWORD=aqua123456
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aqua_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua_celery_beat
    command: celery -A aqua_platform beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=aqua_platform
      - DB_USER=aqua_user
      - DB_PASSWORD=aqua123456
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aqua_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aqua_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - aqua_network

volumes:
  mysql_data:
  rabbitmq_data:
  redis_data:

networks:
  aqua_network:
    driver: bridge
